<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galdi — Gestión Interna</title>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
  import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCby6gofQ9lK8eji9TWobaxyuETYfs2KKU",
    authDomain: "galdi-web.firebaseapp.com",
    projectId: "galdi-web",
    storageBucket: "galdi-web.firebasestorage.app",
    messagingSenderId: "671477604387",
    appId: "1:671477604387:web:be01e85a9e421327269196"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const AUTORIZADOS = ['contacto@okasa.cl', 'ventas@galdi.cl'];

  window.login = async () => {
    try {
      document.getElementById('error').textContent = '';
      const result = await signInWithPopup(auth, provider);
      if (!AUTORIZADOS.includes(result.user.email)) {
        await signOut(auth);
        document.getElementById('error').textContent = 'Acceso no autorizado.';
      }
    } catch(e) {
      document.getElementById('error').textContent = 'Error: ' + e.message;
    }
  };

  window.logout = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    document.getElementById('pantalla-login').style.display = user ? 'none' : 'flex';
    document.getElementById('pantalla-app').style.display = user ? 'block' : 'none';
    if (user) {
      document.getElementById('user-email').textContent = user.email;
      cargarApp();
    }
  });

  async function cargarApp() {
    document.getElementById('app-container').innerHTML = '<p style="color:#9c7a5a;padding:24px;">✓ Autenticado. Cargando sistema de gestión...</p>';
    setTimeout(() => {
      document.getElementById('app-container').innerHTML = `
        <iframe src="/gestion-app.html" style="width:100%;height:calc(100vh - 56px);border:none;"></iframe>
      `;
    }, 500);
  }
</script>
</head>
<body style="margin:0;font-family:sans-serif;background:#F9F3EC;">

<div id="pantalla-login" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#F9F3EC;">
  <h1 style="font-family:Georgia,serif;font-weight:300;font-size:2.2rem;color:#1a0f0a;margin:0 0 6px;">galdi</h1>
  <p style="color:#9c7a5a;font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;margin:0 0 36px;">Gestión Interna</p>
  <p id="error" style="color:#9b3a2a;font-size:0.85rem;margin:0 0 16px;min-height:20px;"></p>
  <button onclick="window.login()" style="background:#C9A55A;color:#fff;border:none;padding:12px 32px;border-radius:6px;font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-weight:600;">
    Iniciar sesión con Google
  </button>
</div>

<div id="pantalla-app" style="display:none;">
  <div style="background:#1a0f0a;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #C9A55A;">
    <span style="color:#fff;font-family:Georgia,serif;font-size:1.2rem;font-weight:300;">galdi · gestión</span>
    <div style="display:flex;align-items:center;gap:16px;">
      <span id="user-email" style="color:#9c7a5a;font-size:0.8rem;"></span>
      <button onclick="window.logout()" style="background:transparent;border:1px solid #C9A55A;color:#C9A55A;padding:5px 14px;border-radius:4px;font-size:0.75rem;cursor:pointer;">Salir</button>
    </div>
  </div>
  <div id="app-container"></div>
</div>

</body>
</html>
